# support_concept_map.yml
# Maps XAF support ticket features -> taxonomy concept IDs (from config/xaf-taxonomy.json)
# gap_type values: covered | partial | missing_concept | out_of_scope | meta
#
# covered       - feature is well-documented under the mapped concepts
# partial       - documentation exists but is incomplete or split across platforms
# missing_concept - ticket volume exists but no taxonomy concept covers it
# out_of_scope  - deprecated, infrastructure-only, or third-party topic
# meta          - diagnostic/troubleshooting bucket, not a documentation gap per se

mappings:

