# Usage Notes
# -----------
# This map enables:
# 1. Search query translation (user language → documentation concepts)
# 2. Cross-linking recommendations (ticket categories → API references)
# 3. Documentation gap analysis (high-volume tickets without good concept matches)
# 4. Synonym generation (user phrases → concept synonyms)
#
# Confidence scores:
# - 10: Exact match between ticket category and concept
# - 7: Good match with some semantic distance
# - 5: Weak match, may need refinement
# - 0: UNMAPPED - needs manual review
