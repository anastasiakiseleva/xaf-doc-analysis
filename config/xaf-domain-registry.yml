schema_version: 1.0

taxonomy_domains:

  - id: architecture
    name: Architecture
    description: >
      Core structural concepts that define how XAF applications are composed,
      initialized, extended, and scaled.
    subdomains:
      - id: core
        name: Core Application
      - id: modules
        name: Modular Architecture
      - id: application-model
        name: Application Model
      - id: dependency-injection
        name: Dependency Injection
      - id: middle-tier
        name: Middle Tier
      - id: multi-tenancy
        name: Multi-Tenancy
      - id: scalability
        name: Scalability

  - id: ui
    name: UI Framework
    description: >
      User interface framework concepts including views, editors, actions,
      controllers, layout, navigation, and UX behavior.
    subdomains:
      - id: views
        name: Views
      - id: layout
        name: Layout & Templates
      - id: editors
        name: Property Editors
      - id: list-editors
        name: List Editors
      - id: controllers
        name: Controllers
      - id: actions
        name: Actions
      - id: windows-frames
        name: Windows & Frames
      - id: navigation
        name: Navigation
      - id: theming
        name: Theming & Styling
      - id: ux
        name: UX & Interaction Patterns

  - id: data
    name: Data & Persistence
    description: >
      Business data modeling, persistence, querying, concurrency,
      and database interaction.
    subdomains:
      - id: business-model
        name: Business Model
      - id: object-space
        name: Object Space
      - id: orm
        name: Object-Relational Mapping
      - id: relationships
        name: Object Relationships
      - id: properties
        name: Business Properties
      - id: criteria
        name: Criteria & Query Language
      - id: concurrency
        name: Concurrency Control
      - id: database
        name: Database Integration
      - id: updates
        name: Database Updates & Seeding

  - id: security
    name: Security
    description: >
      Authentication, authorization, permissions, auditing, and
      secured data access.
    subdomains:
      - id: core
        name: Security Core
      - id: authentication
        name: Authentication
      - id: authorization
        name: Authorization
      - id: users
        name: Users & Roles
      - id: auditing
        name: Auditing
        description: >
          Conceptual auditing concerns: tracking who changed what, when, and why.
          Covers the Audit Trail Module as an implementation, security permissions
          on audit data, and database-level auditing recommendations for changes
          made outside XAF (e.g., direct SQL). Distinct from modules.audit-trail,
          which covers the installable NuGet module specifically.

  - id: modules
    name: Modules
    description: >
      Installable XAF modules that deliver feature-oriented functionality.
    subdomains:
      - id: validation
        name: Validation
      - id: reports
        name: Reports
      - id: charts
        name: Charts
      - id: dashboards
        name: Dashboards
      - id: pivot-grid
        name: Pivot Grid
      - id: scheduler
        name: Scheduler
      - id: state-machine
        name: State Machine
      - id: notifications
        name: Notifications
      - id: office
        name: Office
      - id: clone-object
        name: Clone Object
      - id: file-attachments
        name: File Attachments
      - id: tree-list-editors
        name: Tree List Editors
      - id: view-variants
        name: View Variants
      - id: conditional-appearance
        name: Conditional Appearance
      - id: audit-trail
        name: Audit Trail

  - id: platform
    name: Platform & Runtime
    description: >
      Execution environments, UI platforms, threading,
      and runtime behavior.
    subdomains:
      - id: ui-platforms
        name: UI Platforms
      - id: services
        name: Application Services
      - id: threading
        name: Async & Threading

  - id: ops
    name: Operations
    description: >
      Deployment, hosting, logging, diagnostics, and production operations.
    subdomains:
      - id: deployment
        name: Deployment
      - id: logging
        name: Logging
      - id: diagnostics
        name: Diagnostics & Tracing

  - id: quality
    name: Quality & Performance
    description: >
      Validation quality, testing, performance tuning,
      and memory management.
    subdomains:
      - id: testing
        name: Testing
      - id: performance
        name: Performance Optimization
      - id: memory
        name: Memory Management

  - id: tooling
    name: Tooling & Setup
    description: >
      Development tools, project scaffolding,
      and package management.
    subdomains:
      - id: project-creation
        name: Project Creation
      - id: package-management
        name: Package Management
      - id: modeling-tools
        name: Modeling Tools

  - id: migration
    name: Migration & Legacy
    description: >
      Legacy support, platform migration,
      and upgrade paths.
    subdomains:
      - id: legacy
        name: Legacy Platforms
      - id: migration
        name: Migration & Upgrades

  - id: learning
    name: Learning & Samples
    description: >
      Educational resources, demos,
      and sample applications.
    subdomains:
      - id: examples
        name: Demo Applications

  - id: localization
    name: Localization
    description: >
      Language, culture, and localization support.
    subdomains:
      - id: localization
        name: Localization